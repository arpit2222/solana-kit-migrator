kind = "web"
previewPath = "/"
title = "Solana Kit Migrator"
version = "1.0.0"
id = "artifacts/solana-migrator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23257

[services.development]
run = "pnpm --filter @workspace/solana-migrator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/solana-migrator", "run", "build" ]
publicDir = "artifacts/solana-migrator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23257"
BASE_PATH = "/"
